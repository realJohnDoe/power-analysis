version: "3.8"

services:
  tibber-power:
    build: .
    container_name: tibber-power
    env_file:
      # Mount .env file for configuration
      - .env
    volumes:
      # Mount Synology NAS folder for CSV output
      # Monthly files will be created like: tibber_pulse_2024-01.csv
      - /volume1/docker/power-analysis/data:/data
    # Run stream command - streams for 24 hours then restarts
    command: ["tibber-power", "stream"]
    restart: unless-stopped